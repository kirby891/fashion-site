<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact us</title>
    <link rel="stylesheet" href="../css/contact.css">
</head>
<body>

    <!-- Header -->
    <header>
        <h1><a href="../html/home.html">Home</a></h1> <!-- Link added here -->
        <a href="../html/login.html"><div class="user-icon">👤</div></a>
    </header>

    <!-- Contact Section -->
    <section class="contact-section">
        <div class="contact-form">
            <h2>Contact us</h2>
            <form action="submit_inquiry.php" method="post">
                <label for="name">Full name</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>

                <label for="subject">Subject</label>
                <input type="text" id="subject" name="subject" required>

                <label for="message">Message</label>
                <textarea id="message" name="message" required></textarea>

                <button type="submit">Submit</button>
            </form>
        </div>

        <div class="contact-image">
            <img src="../images/fashion girl.jpg" alt="Fashion Model">
        </div>
    </section>

    <!-- Social Media Links -->
    <div class="social-media">
        <a href="https://instagram.com" target="_blank"><img src="../images/instagram.png" alt="Instagram"></a>
        <a href="https://facebook.com" target="_blank"><img src="../images/facebook.png" alt="Facebook"></a>
        <a href="https://twitter.com" target="_blank"><img src="../images/twitter.png" alt="Twitter"></a>
        <a href="https://pinterest.com" target="_blank"><img src="../images/pinterest.png" alt="Pinterest"></a>
    </div>

    <!-- Footer -->
    <footer>
        <p>@Fashion company</p>
    </footer>

</body>
</html>
