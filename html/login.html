<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login and Registration</title>
    <link rel="stylesheet" href="../css/log in.css">
</head>
<body>

<div class="container">
    <!-- Login Form -->
    <div class="form login-form">
        <h2>USER LOGIN</h2>
        <label for="username">Username</label>
        <div class="input-container">
            <input type="text" id="username" required>
            <span class="icon">👤</span>
        </div>
        <label for="password">Password</label>
        <div class="input-container">
            <input type="password" id="password" required>
            <span class="icon">🔒</span>
        </div>
        <button id="login-btn">LOG IN</button>
        <a href="#" id="switch-to-register">Sign up to continue.</a>
    </div>

    <!-- Registration Form -->
    <div class="form register-form">
        <h2>New Registration</h2>
        <label for="name">NAME</label>
        <input type="text" id="name" required>
        
        <label for="email">EMAIL</label>
        <input type="email" id="email" required>
        
        <label for="register-password">Password</label>
        <input type="password" id="register-password" required>
        
        <button id="signup-btn" disabled>SIGN UP</button>
        <a href="#" id="switch-to-login">Already Registered ? Log in here.</a>
    </div>
</div>

<script src="../script/log in.script.js"></script>
<script>
    // Sign Up Button Click Event
    document.getElementById('signup-btn').addEventListener('click', function(e) {
        e.preventDefault();

        // Get user input values
        const username = document.getElementById('reg-username').value;
        const password = document.getElementById('reg-password').value;

        // Check if fields are filled
        if (username && password) {
            // Store username and password in localStorage
            localStorage.setItem('username', username);
            localStorage.setItem('password', password);

            // Redirect to login page after successful registration
            alert('Registration successful! You can now log in.');
            window.location.href = 'login.html';
        } else {
            alert('Please fill in all fields.');
        }
    });
</script>

<script>
    // Login Button Click Event
    document.getElementById('login-btn').addEventListener('click', function(e) {
        e.preventDefault();

        // Get entered username and password
        const enteredUsername = document.getElementById('login-username').value;
        const enteredPassword = document.getElementById('login-password').value;

        // Get stored username and password from localStorage
        const storedUsername = localStorage.getItem('username');
        const storedPassword = localStorage.getItem('password');

        // Check if the entered credentials match the stored credentials
        if (enteredUsername === storedUsername && enteredPassword === storedPassword) {
            // Redirect to home page if login is successful
            window.location.href = '../html/home.html';
        } else {
            alert('Incorrect username or password. Please try again.');
        }
    });
</script>
        
</body>
</html>
